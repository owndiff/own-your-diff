name: Bug report
description: Report a reproducible OwnDiff bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste secrets, private source code, local absolute paths, tokens, or generated reports that contain confidential repository details.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use a minimal public example when possible.
      placeholder: |
        1. Create or open a git repo.
        2. Change ...
        3. Run ...
        4. See ...
    validations:
      required: true

  - type: input
    id: install-method
    attributes:
      label: Install method
      placeholder: "release binary, source runtime, Claude plugin, Codex plugin, project rules"
    validations:
      required: true

  - type: input
    id: owndiff-version
    attributes:
      label: OwnDiff version or commit
      placeholder: "owndiff 0.2.0 or commit SHA"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "macOS x86_64 binary, Linux x86_64 binary, Python 3.11.9 source runtime"
    validations:
      required: false

  - type: textarea
    id: sanitized-output
    attributes:
      label: Sanitized output
      description: Paste only redacted output that does not reveal private paths, secrets, or source code.
      render: shell
    validations:
      required: false
