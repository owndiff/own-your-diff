name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

  cli-install:
    name: CLI install harness
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[build]'

      - name: Run OpenClaw OwnDiff flow
        run: python scripts/ci_openclaw_flow.py

      - name: Build executable
        run: python scripts/build_binary.py --name owndiff

      - name: Install executable through installer
        env:
          OWNDIFF_BIN_DIR: ${{ runner.temp }}/owndiff-bin
          OWNDIFF_BINARY_NAME: owndiff
          OWNDIFF_DOWNLOAD_URL: file://${{ github.workspace }}/dist/owndiff
        run: |
          sh install.sh
          "$OWNDIFF_BIN_DIR/owndiff" --version
          "$OWNDIFF_BIN_DIR/owndiff" run --help
          "$OWNDIFF_BIN_DIR/owndiff" install-agent-rules --help
          "$OWNDIFF_BIN_DIR/owndiff" quiz-web --help

      - name: Verify public installer detection
        env:
          OWNDIFF_DRY_RUN: "1"
          OWNDIFF_BIN_DIR: ${{ runner.temp }}/owndiff-bin
        run: sh install.sh

      - name: Verify installer asset matrix
        env:
          OWNDIFF_DRY_RUN: "1"
          OWNDIFF_BIN_DIR: ${{ runner.temp }}/owndiff-bin
        run: |
          check_asset() {
            os="$1"
            arch="$2"
            expected="$3"
            fake_bin="$(mktemp -d)"
            {
              printf '%s\n' '#!/usr/bin/env sh'
              printf '%s\n' 'case "$1" in'
              printf '  -s) echo %s ;;\n' "$os"
              printf '  -m) echo %s ;;\n' "$arch"
              printf '%s\n' '  *) exit 2 ;;'
              printf '%s\n' 'esac'
            } > "$fake_bin/uname"
            chmod +x "$fake_bin/uname"
            actual="$(PATH="$fake_bin:$PATH" sh install.sh | awk -F= '/^asset=/{print $2}')"
            rm -rf "$fake_bin"
            test "$actual" = "$expected"
          }

          check_asset Darwin arm64 owndiff-darwin-arm64
          check_asset Darwin x86_64 owndiff-darwin-x86_64
          check_asset Linux aarch64 owndiff-linux-arm64
          check_asset Linux x86_64 owndiff-linux-x86_64
