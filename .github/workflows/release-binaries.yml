name: Release binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    container: ubuntu:20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset: owndiff-linux-x86_64
          - os: ubuntu-24.04-arm
            asset: owndiff-linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and smoke test Linux executable
        run: bash scripts/build_linux_release_binary.sh "${{ matrix.asset }}"

      - name: Install executable through installer
        env:
          OWNDIFF_BIN_DIR: ${{ runner.temp }}/owndiff-bin
          OWNDIFF_BINARY_NAME: owndiff
        run: |
          export OWNDIFF_DOWNLOAD_URL="file://${PWD}/dist/${{ matrix.asset }}"
          sh install.sh
          "$OWNDIFF_BIN_DIR/owndiff" --version
          "$OWNDIFF_BIN_DIR/owndiff" run --help
          "$OWNDIFF_BIN_DIR/owndiff" install-agent-rules --help
          "$OWNDIFF_BIN_DIR/owndiff" quiz-web --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  build-macos:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26-intel
            asset: owndiff-darwin-x86_64
          - os: macos-26
            asset: owndiff-darwin-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[build]'

      - name: Run OpenClaw OwnDiff flow
        run: python scripts/ci_openclaw_flow.py

      - name: Build executable
        run: python scripts/build_binary.py --name "${{ matrix.asset }}"

      - name: Smoke test executable
        run: |
          ./dist/${{ matrix.asset }} --version
          ./dist/${{ matrix.asset }} run --help
          ./dist/${{ matrix.asset }} install-agent-rules --help
          ./dist/${{ matrix.asset }} quiz-web --help

      - name: Install executable through installer
        env:
          OWNDIFF_BIN_DIR: ${{ runner.temp }}/owndiff-bin
          OWNDIFF_BINARY_NAME: owndiff
        run: |
          export OWNDIFF_DOWNLOAD_URL="file://${PWD}/dist/${{ matrix.asset }}"
          sh install.sh
          "$OWNDIFF_BIN_DIR/owndiff" --version
          "$OWNDIFF_BIN_DIR/owndiff" run --help
          "$OWNDIFF_BIN_DIR/owndiff" install-agent-rules --help
          "$OWNDIFF_BIN_DIR/owndiff" quiz-web --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs:
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --verify-tag
