schema_version: owndiff.agent_install.v1

default_agents:
  - claude-code
  - codex
  - opencode
  - gemini-cli
  - pi
  - hermes
  - devin

rule_body: |
  Before pushing, opening, or updating a merge request, run:

  {{python_command}} {{skill_dir}}/scripts/run_owndiff.py --repo . --out-dir .owndiff

  OwnDiff uses LLM-written ownership questions and answer choices for medium, high, and critical risk. Use your own current LLM/API context as the coding agent to answer the generated OwnDiff prompt. OwnDiff does not perform web search or browsing for question generation.

  If run_owndiff.py returns "awaiting_llm_response": true or "question_generation": "agent_llm_required", read .owndiff/question-prompt.md, use your own LLM/API reasoning to produce only the requested JSON, write it to .owndiff/question-response.json, then rerun:

  {{python_command}} {{skill_dir}}/scripts/run_owndiff.py --repo . --out-dir .owndiff --llm-response .owndiff/question-response.json

  If run_owndiff.py rejects the LLM response as invalid, repeated, hard, ungrounded, or hallucinated, regenerate the JSON from the same prompt and rerun validation. Generate every question and answer choice with your active model. Do not invent facts, do not use web search, do not use deterministic fallback questions or choices, and do not push/open/update a merge request until OwnDiff validates the MCQs.

  If .owndiff/ownership-gate.json says "agent_may_push_merge_request": true, you may proceed after normal tests pass.

  If the gate is question_generation_required, pending_answers, failed, or "agent_may_push_merge_request" is false, do not stop after a summary. Complete question generation if needed, then immediately start the ownership-answer flow before pushing or opening/updating a merge request.

  When reporting the result to the user, use a compact gate summary and avoid absolute local paths unless the user explicitly asks for them:

  OwnDiff Gate: Passed
  Mode: report_only
  Push/MR: allowed

  - Risk: low (0/100)
  - Diff: 0 files changed
  - Test gap: no
  - Evidence: .owndiff/ownership-report.md

  If "agent_may_push_merge_request" is false, use "OwnDiff Gate: Blocked" and set "Push/MR: blocked". If question generation is required, complete the agent LLM response step first; otherwise immediately run the TUI MCQ flow.

  Use the terminal picker as the default user flow. It lets the human use arrow keys, Enter, explicit Submit gate/Edit answers/Cancel actions, and terminal mouse clicks when supported:

  {{python_command}} {{skill_dir}}/scripts/quiz_tui.py --mcq .owndiff/ownership-mcq.json --answer-key .owndiff/ownership-answer-key.json --answers-out .owndiff/ownership-answers.json --gate-out .owndiff/ownership-gate.json --evaluate

  Interpret quiz_tui.py exit codes this way:
  - 0 means answers were written and the evaluated gate passed.
  - 2 means setup/no-TTY failure; ask the human to run the same quiz_tui.py command in a real terminal.
  - 3 means answers were written but the evaluated gate failed.
  - 130 means the human canceled.

  If quiz_tui.py reports that no TTY is available, do not print MCQs in chat and do not ask for typed answers. Tell the human to run the quiz_tui.py command above in an interactive terminal from the target repository, then return after the selector exits.

  After the human returns, read .owndiff/ownership-gate.json and continue only if "agent_may_push_merge_request" is true.

  After evaluation, report .owndiff/ownership-gate.json attempt_summary, such as "Passed after 2 attempts." or "Attempt 1 failed: 2/3 correct."

  Keep .owndiff/ownership-answer-key.json local. Never print or paste the answer key into chat.

  Do not push, open, or update the merge request unless the evaluated gate says "agent_may_push_merge_request": true.

  The real interactive TUI is scripts/quiz_tui.py and follows the terminal quiz/review flow shown in the README GIF. The GIF also includes non-interactive install/setup/gate storyboard frames; do not imply those outer slides are part of the live curses TUI.

agents:
  claude-code:
    description: Claude Code project skill plus durable project instruction.
    docs_url: https://code.claude.com/docs/en/skills
    actions:
      - type: append_marked
        path: CLAUDE.md
        content: |
          ## OwnDiff Ownership Gate

          {{rule_body}}
      - type: symlink
        path: .claude/skills/owndiff
        target: "{{skill_dir}}"

  codex:
    description: OpenAI Codex project instructions plus project skill.
    docs_url: https://developers.openai.com/codex/guides/agents-md
    actions:
      - type: append_marked
        path: AGENTS.md
        content: |
          ## OwnDiff Ownership Gate

          {{rule_body}}
      - type: symlink
        path: .agents/skills/owndiff
        target: "{{skill_dir}}"

  opencode:
    description: OpenCode project instructions plus project skill.
    docs_url: https://opencode.ai/docs/rules/
    actions:
      - type: append_marked
        path: AGENTS.md
        content: |
          ## OwnDiff Ownership Gate

          {{rule_body}}
      - type: symlink
        path: .agents/skills/owndiff
        target: "{{skill_dir}}"

  gemini-cli:
    description: Gemini CLI project context plus project skill alias.
    docs_url: https://geminicli.com/docs/cli/using-agent-skills/
    actions:
      - type: append_marked
        path: GEMINI.md
        content: |
          ## OwnDiff Ownership Gate

          {{rule_body}}
      - type: symlink
        path: .agents/skills/owndiff
        target: "{{skill_dir}}"

  pi:
    description: Pi project context plus project skill alias.
    docs_url: https://pi.dev/docs/latest/skills
    actions:
      - type: append_marked
        path: AGENTS.md
        content: |
          ## OwnDiff Ownership Gate

          {{rule_body}}
      - type: symlink
        path: .agents/skills/owndiff
        target: "{{skill_dir}}"

  hermes:
    description: Hermes project instructions through AGENTS.md.
    docs_url: https://hermes-agent.nousresearch.com/docs/user-guide/features/context-files
    actions:
      - type: append_marked
        path: AGENTS.md
        content: |
          ## OwnDiff Ownership Gate

          {{rule_body}}

  devin:
    description: Devin Desktop workspace rule.
    docs_url: https://docs.devin.ai/desktop/cascade/memories
    actions:
      - type: write_file
        path: .devin/rules/owndiff.md
        content: |
          ---
          trigger: always_on
          ---

          # OwnDiff Ownership Gate

          {{rule_body}}
