# Copy selected keys into a target repository's .owndiff.yml.
# OwnDiff deep-merges this file shape over configs/default_config.yaml.

diff:
  language_extensions:
    ".foo": "foo"
  source_extensions:
    ".foo": true

risk:
  thresholds:
    medium: 20
    high: 45
    critical: 75
  domain_rules:
    feature_flags:
      score: 18
      severity: "medium"
      path_terms: ["flags", "experiments"]
      content_terms: ["feature_flag", "experiment"]
      message: "Touches feature flag or experiment rollout behavior"

questions:
  question_counts:
    medium: 5
    high: 5
    critical: 5
  llm:
    enabled: true
    provider: "agent"

mcq:
  enabled_risk_levels: ["medium", "high", "critical"]
  required_score_percent: 100
